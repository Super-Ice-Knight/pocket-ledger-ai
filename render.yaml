services:
  - type: web
    name: pocket-ledger-ai-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: POCKET_LEDGER_DB_PATH
        value: data/pocket_ledger.db
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_COMPATIBLE_BASE_URL
        value: https://apihub.agnes-ai.com/v1
      - key: OPENAI_COMPATIBLE_MODEL
        value: agnes-2.0-flash
      - key: OPENAI_COMPATIBLE_API_KEY
        sync: false
      - key: BACKUP_OPENAI_COMPATIBLE_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: BACKUP_OPENAI_COMPATIBLE_MODEL
        value: deepseek-ai/DeepSeek-V4-Flash
      - key: BACKUP_OPENAI_COMPATIBLE_API_KEY
        sync: false
      - key: AI_REQUEST_TIMEOUT_SECONDS
        value: "45"
      - key: RUNTIME_AI_SETTINGS_WRITABLE
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://pocket-ledger-ai.vercel.app
